version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: inventory-service/proto

plugins:
  # 1. Go Generation (Remote)
  - remote: buf.build/protocolbuffers/go:v1.36.5
    out: ../services/InventoryService/proto
    opt: paths=source_relative

  - remote: buf.build/grpc/go:v1.5.1
    out: ../services/InventoryService/proto
    opt: paths=source_relative

  # 2. TypeScript Generation (Remote)
  - remote: buf.build/bufbuild/es:v1.10.0
    out: ../services/PaymentService/src/generated
    opt: target=ts

  - remote: buf.build/connectrpc/es:v1.6.1
    out: ../services/PaymentService/src/generated
    opt: target=ts

  # 3. C# Generation (Remote)
  - remote: buf.build/protocolbuffers/csharp:v29.3
    out: ../services/OrderService/Generated
  
  - remote: buf.build/grpc/csharp:v1.69.0
    out: ../services/OrderService/Generated
