name: Azure CD - Deploy to AKS

on:
  workflow_run:
    workflows: ["Microservices CI Pipeline"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'

jobs:
  build-and-push-acr:
    name: Build & Push to ACR
    runs-on: self-hosted
    # Only run if the triggering CI pipeline was successful OR if triggered manually
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Metadata
        id: meta
        run: |
          echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "registry=${{ secrets.ACR_NAME }}.azurecr.io" >> $GITHUB_OUTPUT

      - name: Build & Push OrderService
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/OrderService/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.registry }}/order-service:${{ github.sha }}
            ${{ steps.meta.outputs.registry }}/order-service:${{ steps.meta.outputs.sha_short }}
            ${{ steps.meta.outputs.registry }}/order-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push PaymentService
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/PaymentService/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.registry }}/payment-service:${{ github.sha }}
            ${{ steps.meta.outputs.registry }}/payment-service:${{ steps.meta.outputs.sha_short }}
            ${{ steps.meta.outputs.registry }}/payment-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push IdentityService
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/IdentityService/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.registry }}/identity-service:${{ github.sha }}
            ${{ steps.meta.outputs.registry }}/identity-service:${{ steps.meta.outputs.sha_short }}
            ${{ steps.meta.outputs.registry }}/identity-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-azure:
    name: Deploy to Azure (AKS)
    needs: [build-and-push-acr]
    runs-on: self-hosted
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AZURE_CLUSTER_NAME }}

      - name: Deploy to AKS via Helm
        run: |
          VERSION=$(echo ${{ github.sha }} | cut -c1-7)
          REGISTRY="${{ secrets.ACR_NAME }}.azurecr.io"
          
          # Deploy all services using Helm
          helm upgrade --install identity-service ./platform/charts/apps/identity-service --namespace default \
            --set image.repository=$REGISTRY/identity-service --set image.tag=$VERSION
            
          helm upgrade --install order-service ./platform/charts/apps/order-service --namespace default \
            --set image.repository=$REGISTRY/order-service --set image.tag=$VERSION
            
          helm upgrade --install payment-service ./platform/charts/apps/payment-service --namespace default \
            --set image.repository=$REGISTRY/payment-service --set image.tag=$VERSION
            
          helm upgrade --install inventory-service ./platform/charts/apps/inventory-service --namespace default \
            --set image.repository=$REGISTRY/inventory-service --set image.tag=$VERSION
