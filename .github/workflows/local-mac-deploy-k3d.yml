name: Local Mac CD - Deploy to K3d

on:
  workflow_run:
    workflows: ["Microservices CI Pipeline"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'local-k3d'

jobs:
  deploy-to-k3d:
    name: CD - Deploy to Local K3d
    runs-on: self-hosted
    # Only run if the triggering CI pipeline was successful OR if triggered manually
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Ensure K3d Cluster Exists
      run: |
        chmod +x platform/cluster/setup-k3d.sh
        ./platform/cluster/setup-k3d.sh

    - name: Build and Push Local Images
      run: |
        # Generate a short SHA for the version
        VERSION=$(echo ${{ github.sha }} | cut -c1-7)
        echo "🚀 Deploying Version: $VERSION"

        # Build all services with Version Injection
        docker build -t localhost:5001/identity-service:latest --build-arg APP_VERSION=$VERSION -f services/IdentityService/Dockerfile .
        docker build -t localhost:5001/order-service:latest --build-arg APP_VERSION=$VERSION -f services/OrderService/Dockerfile .
        docker build -t localhost:5001/payment-service:latest --build-arg APP_VERSION=$VERSION -f services/PaymentService/Dockerfile .
        docker build -t localhost:5001/inventory-service:latest --build-arg APP_VERSION=$VERSION -f services/InventoryService/Dockerfile .
        
        # Push all to Local Registry (Port 5001)
        docker push localhost:5001/identity-service:latest
        docker push localhost:5001/order-service:latest
        docker push localhost:5001/payment-service:latest
        docker push localhost:5001/inventory-service:latest

    - name: Deploy to Kubernetes via Helm
      run: |
        VERSION=$(echo ${{ github.sha }} | cut -c1-7)
        
        # Deploy all services using Helm with injected VERSION
        # Note: Internally, K3d uses port 5000 for its registry mirror
        helm upgrade --install identity-service ./platform/charts/apps/identity-service --namespace default \
          --set image.repository=k3d-micro-registry:5000/identity-service --set image.tag=latest --set env.APP_VERSION=$VERSION
          
        helm upgrade --install order-service ./platform/charts/apps/order-service --namespace default \
          --set image.repository=k3d-micro-registry:5000/order-service --set image.tag=latest --set env.APP_VERSION=$VERSION
          
        helm upgrade --install payment-service ./platform/charts/apps/payment-service --namespace default \
          --set image.repository=k3d-micro-registry:5000/payment-service --set image.tag=latest --set env.APP_VERSION=$VERSION
          
        helm upgrade --install inventory-service ./platform/charts/apps/inventory-service --namespace default \
          --set image.repository=k3d-micro-registry:5000/inventory-service --set image.tag=latest --set env.APP_VERSION=$VERSION

    - name: Verify Deployment
      run: |
        kubectl get pods -n default
        kubectl get svc -n default
