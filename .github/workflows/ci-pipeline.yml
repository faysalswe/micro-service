name: Microservices CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '20.x'

jobs:
  # Job 1: Build and Test .NET OrderService
  orderservice-build-test:
    name: OrderService (.NET) - Build & Test
    runs-on: self-hosted
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore Dependencies
      run: dotnet restore services/dotnet-backend.sln
      
    - name: Build OrderService
      run: dotnet build services/OrderService/OrderService.csproj --configuration Release --no-restore
      
    - name: Run Unit Tests
      run: dotnet test services/OrderService.Tests/OrderService.Tests.csproj --configuration Release --no-build --verbosity normal --filter "FullyQualifiedName~OrderProcessingServiceTests"
      
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: orderservice-build
        path: services/OrderService/bin/Release/
        retention-days: 1

  # Job 2: Build and Test Node.js PaymentService
  paymentservice-build-test:
    name: PaymentService (Node.js) - Build & Test
    runs-on: self-hosted
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: services/PaymentService/package-lock.json
        
    - name: Install Dependencies
      working-directory: services/PaymentService
      run: npm ci
      
    - name: Run Tests
      working-directory: services/PaymentService
      run: npm test
      
    - name: Upload Test Coverage
      uses: actions/upload-artifact@v4
      with:
        name: paymentservice-coverage
        path: services/PaymentService/coverage/
        retention-days: 1

  # Job 3: Build and Test IdentityService
  identityservice-build-test:
    name: IdentityService (.NET) - Build & Test
    runs-on: self-hosted
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore Dependencies
      run: dotnet restore services/dotnet-backend.sln
      
    - name: Build IdentityService
      run: dotnet build services/IdentityService/IdentityService.csproj --configuration Release --no-restore
      
    - name: Run Unit Tests
      run: dotnet test services/IdentityService.Tests/IdentityService.Tests.csproj --configuration Release --no-build --verbosity normal

  # Job 4: Build and Test Go InventoryService
  inventoryservice-build-test:
    name: InventoryService (Go) - Build & Test
    runs-on: self-hosted
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        cache: true
        cache-dependency-path: services/InventoryService/go.sum
        
    - name: Install Protoc & Plugins
      run: |
        sudo apt-get update && sudo apt-get install -y protobuf-compiler
        go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
        go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
        export PATH=$PATH:$(go env GOPATH)/bin
        
    - name: Build InventoryService
      working-directory: services/InventoryService
      run: go build -v ./cmd/server/main.go
      
    - name: Run Tests
      working-directory: services/InventoryService
      run: go test -v ./...

  # Job 5: Contract Testing with Pact
  contract-tests:
    name: Contract Tests (Pact)
    runs-on: self-hosted
    needs: [orderservice-build-test, paymentservice-build-test, identityservice-build-test, inventoryservice-build-test]
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore Test Dependencies
      run: dotnet restore services/dotnet-backend.sln
      
    - name: Run Contract Tests (Consumer)
      run: dotnet test services/OrderService.Tests/OrderService.Tests.csproj --filter "FullyQualifiedName~ContractTests" --verbosity normal
      
    - name: Upload Pact Files
      uses: actions/upload-artifact@v4
      with:
        name: pact-contracts
        path: tests/pacts/
        retention-days: 30
        
    - name: Publish Pact Contracts (Optional)
      if: github.ref == 'refs/heads/main'
      run: |
        echo "🔍 Pact files generated:"
        ls -la tests/pacts/
        echo "ℹ️  In production, these would be published to a Pact Broker"
        echo "ℹ️  Example: pact-broker publish pacts/ --consumer-app-version=${{ github.sha }}"

  # Job 6: Integration Check
  integration-check:
    name: Integration Status Check
    runs-on: self-hosted
    needs: [orderservice-build-test, paymentservice-build-test, identityservice-build-test, inventoryservice-build-test, contract-tests]
    if: always()

    steps:
    - name: Check All Jobs Status
      run: |
        if [[ "${{ needs.orderservice-build-test.result }}" == "success" && \
              "${{ needs.paymentservice-build-test.result }}" == "success" && \
              "${{ needs.identityservice-build-test.result }}" == "success" && \
              "${{ needs.inventoryservice-build-test.result }}" == "success" && \
              "${{ needs.contract-tests.result }}" == "success" ]]; then
          echo "All services passed CI checks"
          exit 0
        else
          echo "One or more services failed CI checks"
          echo "OrderService: ${{ needs.orderservice-build-test.result }}"
          echo "PaymentService: ${{ needs.paymentservice-build-test.result }}"
          echo "IdentityService: ${{ needs.identityservice-build-test.result }}"
          echo "InventoryService: ${{ needs.inventoryservice-build-test.result }}"
          echo "Contract Tests: ${{ needs.contract-tests.result }}"
          exit 1
        fi

  # Job 7: Build and Push Docker Images
  docker-build:
    name: Build Docker Images
    runs-on: self-hosted
    needs: [integration-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      run: |
        echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
        echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

    - name: Build and Push OrderService
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./services/OrderService/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/order-service:${{ github.sha }}
          ghcr.io/${{ github.repository }}/order-service:${{ steps.meta.outputs.sha_short }}
          ghcr.io/${{ github.repository }}/order-service:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and Push PaymentService
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./services/PaymentService/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/payment-service:${{ github.sha }}
          ghcr.io/${{ github.repository }}/payment-service:${{ steps.meta.outputs.sha_short }}
          ghcr.io/${{ github.repository }}/payment-service:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and Push IdentityService
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./services/IdentityService/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/identity-service:${{ github.sha }}
          ghcr.io/${{ github.repository }}/identity-service:${{ steps.meta.outputs.sha_short }}
          ghcr.io/${{ github.repository }}/identity-service:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and Push InventoryService
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./services/InventoryService/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/inventory-service:${{ github.sha }}
          ghcr.io/${{ github.repository }}/inventory-service:${{ steps.meta.outputs.sha_short }}
          ghcr.io/${{ github.repository }}/inventory-service:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Print Image Digest
      run: |
        echo "Docker images built and pushed to ghcr.io/${{ github.repository }}"
        echo "Tags: ${{ github.sha }}, ${{ steps.meta.outputs.sha_short }}, latest"

  # Job 8: Local CD - Deploy to Kind Cluster
  local-deploy-kind:
    name: Local CD - Deploy to Kind
    runs-on: self-hosted
    needs: [integration-check]
    if: github.ref == 'refs/heads/develop'

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Ensure Kind Cluster Exists
      run: |
        if ! kind get clusters | grep -q "^kind$"; then
          echo "🚀 Creating Kind cluster..."
          kind create cluster --config platform/cluster/kind-cluster.yaml
        else
          echo "✅ Kind cluster already exists"
        fi

    - name: Ensure Local Registry Exists
      run: |
        if ! docker ps | grep -q "kind-registry"; then
          echo "🚀 Starting Local Registry container..."
          docker run -d --restart=always -p "5000:5000" --network kind --name "kind-registry" registry:2
        else
          echo "✅ Local Registry is already running"
        fi

    - name: Build and Push Local Images
      run: |
        # Generate a short SHA for the version
        VERSION=$(echo ${{ github.sha }} | cut -c1-7)
        echo "🚀 Deploying Version: $VERSION"

        # Build all services with Version Injection
        docker build -t localhost:5000/identity-service:latest --build-arg APP_VERSION=$VERSION -f services/IdentityService/Dockerfile .
        docker build -t localhost:5000/order-service:latest --build-arg APP_VERSION=$VERSION -f services/OrderService/Dockerfile .
        docker build -t localhost:5000/payment-service:latest --build-arg APP_VERSION=$VERSION -f services/PaymentService/Dockerfile .
        docker build -t localhost:5000/inventory-service:latest --build-arg APP_VERSION=$VERSION -f services/InventoryService/Dockerfile .
        
        # Push all to Local Registry
        docker push localhost:5000/identity-service:latest
        docker push localhost:5000/order-service:latest
        docker push localhost:5000/payment-service:latest
        docker push localhost:5000/inventory-service:latest

    - name: Deploy to Kubernetes via Helm
      run: |
        VERSION=$(echo ${{ github.sha }} | cut -c1-7)
        
        # Deploy all services using Helm with injected VERSION
        helm upgrade --install identity-service ./platform/charts/apps/identity-service --namespace default \
          --set image.repository=localhost:5000/identity-service --set image.tag=latest --set env.APP_VERSION=$VERSION
          
        helm upgrade --install order-service ./platform/charts/apps/order-service --namespace default \
          --set image.repository=localhost:5000/order-service --set image.tag=latest --set env.APP_VERSION=$VERSION
          
        helm upgrade --install payment-service ./platform/charts/apps/payment-service --namespace default \
          --set image.repository=localhost:5000/payment-service --set image.tag=latest --set env.APP_VERSION=$VERSION
          
        helm upgrade --install inventory-service ./platform/charts/apps/inventory-service --namespace default \
          --set image.repository=localhost:5000/inventory-service --set image.tag=latest --set env.APP_VERSION=$VERSION

    - name: Verify Deployment
      run: |
        kubectl get pods -n default
        kubectl get svc -n default

