name: Microservices CI Pipeline

on:
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '20.x'

jobs:
  # Job 0: Centralized gRPC Code Generation
  generate-protos:
    name: Generate gRPC Protos (Centralized)
    runs-on: self-hosted
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install Protos Dependencies
      working-directory: protos
      run: npm install

    - name: Generate Protos
      working-directory: protos
      run: npm run generate

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: generated-protos
        path: |
          services/OrderService/Generated/
          services/PaymentService/src/generated/
          services/InventoryService/proto/
        retention-days: 1

  # Job 1: Build and Test .NET OrderService
  orderservice-build-test:
    name: OrderService (.NET) - Build & Test
    runs-on: self-hosted
    needs: [generate-protos]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download Generated Protos
      uses: actions/download-artifact@v4
      with:
        name: generated-protos
        path: .

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore Dependencies
      run: |
        dotnet restore services/OrderService/OrderService.csproj
        dotnet restore services/OrderService.Tests/OrderService.Tests.csproj

    - name: Build OrderService
      run: dotnet build services/OrderService.Tests/OrderService.Tests.csproj --configuration Release --no-restore
    - name: Run Unit Tests
      run: dotnet test services/OrderService.Tests/OrderService.Tests.csproj --configuration Release --verbosity normal --filter "FullyQualifiedName~OrderProcessingServiceTests"

  # Job 2: Build and Test Node.js PaymentService
  paymentservice-build-test:
    name: PaymentService (Node.js) - Build & Test
    runs-on: self-hosted
    needs: [generate-protos]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download Generated Protos
      uses: actions/download-artifact@v4
      with:
        name: generated-protos
        path: .

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    - name: Install pnpm
      run: npm install -g pnpm
        
    - name: Install Dependencies
      working-directory: services/PaymentService
      run: pnpm install --frozen-lockfile
      
    - name: Run Tests
      working-directory: services/PaymentService
      run: pnpm test
      
    - name: Upload Test Coverage
      uses: actions/upload-artifact@v4
      with:
        name: paymentservice-coverage
        path: services/PaymentService/coverage/
        retention-days: 1

  # Job 3: Build and Test IdentityService
  identityservice-build-test:
    name: IdentityService (.NET) - Build & Test
    runs-on: self-hosted
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore Dependencies
      run: |
        dotnet restore services/IdentityService/IdentityService.csproj
        dotnet restore services/IdentityService.Tests/IdentityService.Tests.csproj
      
    - name: Build IdentityService
      run: dotnet build services/IdentityService.Tests/IdentityService.Tests.csproj --configuration Release --no-restore
      
    - name: Run Unit Tests
      run: dotnet test services/IdentityService.Tests/IdentityService.Tests.csproj --configuration Release --verbosity normal

  # Job 4: Build and Test Go InventoryService
  inventoryservice-build-test:
    name: InventoryService (Go) - Build & Test
    runs-on: self-hosted
    needs: [generate-protos]
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download Generated Protos
      uses: actions/download-artifact@v4
      with:
        name: generated-protos
        path: .

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: true
        cache-dependency-path: services/InventoryService/go.sum
        
    - name: Install Pact FFI
      run: |
        curl -fsSL https://raw.githubusercontent.com/pact-foundation/pact-ruby-standalone/master/install.sh | bash
        # Add pact to PATH
        echo "$HOME/pact/bin" >> $GITHUB_PATH
        
        # Install pact-go v2 dependencies (FFI)
        # Using a more robust installation method for self-hosted runners
        if [ ! -d "/usr/local/lib" ]; then sudo mkdir -p /usr/local/lib; fi
        go run github.com/pact-foundation/pact-go/v2@latest install --libDir /usr/local/lib || \
        go run github.com/pact-foundation/pact-go/v2@latest install --libDir $HOME/.pact/lib
        
        if [ -d "$HOME/.pact/lib" ]; then
          echo "LD_LIBRARY_PATH=$HOME/.pact/lib" >> $GITHUB_ENV
          echo "DYLD_LIBRARY_PATH=$HOME/.pact/lib" >> $GITHUB_ENV
        fi
        
    - name: Build InventoryService
      working-directory: services/InventoryService
      run: go build -o inventory-service ./cmd/server/main.go
      
    - name: Run Tests
      working-directory: services/InventoryService
      run: go test -v ./...

  # Job 5: Contract Testing with Pact
  contract-tests:
    name: Contract Tests (Pact)
    runs-on: self-hosted
    needs: [orderservice-build-test, paymentservice-build-test, identityservice-build-test, inventoryservice-build-test]
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Install Pact FFI (Consumer side)
      run: |
        curl -fsSL https://raw.githubusercontent.com/pact-foundation/pact-ruby-standalone/master/install.sh | bash
        # Add pact to PATH
        echo "$HOME/pact/bin" >> $GITHUB_PATH
        
        # Install pact-go v2 dependencies (FFI) for provider verification if needed, 
        # or just ensure shared libraries are available for .NET Pact
        if [ ! -d "/usr/local/lib" ]; then sudo mkdir -p /usr/local/lib; fi
        
        # For .NET, Pact usually downloads its own binaries, but adding the standalone
        # to the path ensures we can use pact-broker CLI etc.
        
    - name: Restore Test Dependencies
      run: dotnet restore services/dotnet-backend.sln
      
    - name: Run Contract Tests (Consumer)
      run: dotnet test services/OrderService.Tests/OrderService.Tests.csproj --filter "FullyQualifiedName~ContractTests" --verbosity normal
      
    - name: Upload Pact Files
      uses: actions/upload-artifact@v4
      with:
        name: pact-contracts
        path: tests/pacts/
        retention-days: 30
        
    - name: Publish Pact Contracts (Optional)
      if: github.ref == 'refs/heads/main'
      run: |
        echo "🔍 Pact files generated:"
        ls -la tests/pacts/
        echo "ℹ️  In production, these would be published to a Pact Broker"
        echo "ℹ️  Example: pact-broker publish pacts/ --consumer-app-version=${{ github.sha }}"

  # Job 6: Integration Check
  integration-check:
    name: Integration Status Check
    runs-on: self-hosted
    needs: [orderservice-build-test, paymentservice-build-test, identityservice-build-test, inventoryservice-build-test, contract-tests]
    if: always()

    steps:
    - name: Check All Jobs Status
      run: |
        if [[ "${{ needs.orderservice-build-test.result }}" == "success" && \
              "${{ needs.paymentservice-build-test.result }}" == "success" && \
              "${{ needs.identityservice-build-test.result }}" == "success" && \
              "${{ needs.inventoryservice-build-test.result }}" == "success" && \
              "${{ needs.contract-tests.result }}" == "success" ]]; then
          echo "All services passed CI checks"
          exit 0
        else
          echo "One or more services failed CI checks"
          echo "OrderService: ${{ needs.orderservice-build-test.result }}"
          echo "PaymentService: ${{ needs.paymentservice-build-test.result }}"
          echo "IdentityService: ${{ needs.identityservice-build-test.result }}"
          echo "InventoryService: ${{ needs.inventoryservice-build-test.result }}"
          echo "Contract Tests: ${{ needs.contract-tests.result }}"
          exit 1
        fi

  # Job 7: Build and Push Docker Images
  docker-build:
    name: Build Docker Images
    runs-on: self-hosted
    needs: [integration-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      run: |
        echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
        echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

    - name: Build and Push OrderService
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./services/OrderService/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/order-service:${{ github.sha }}
          ghcr.io/${{ github.repository }}/order-service:${{ steps.meta.outputs.sha_short }}
          ghcr.io/${{ github.repository }}/order-service:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and Push PaymentService
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./services/PaymentService/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/payment-service:${{ github.sha }}
          ghcr.io/${{ github.repository }}/payment-service:${{ steps.meta.outputs.sha_short }}
          ghcr.io/${{ github.repository }}/payment-service:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and Push IdentityService
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./services/IdentityService/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/identity-service:${{ github.sha }}
          ghcr.io/${{ github.repository }}/identity-service:${{ steps.meta.outputs.sha_short }}
          ghcr.io/${{ github.repository }}/identity-service:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and Push InventoryService
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./services/InventoryService/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/inventory-service:${{ github.sha }}
          ghcr.io/${{ github.repository }}/inventory-service:${{ steps.meta.outputs.sha_short }}
          ghcr.io/${{ github.repository }}/inventory-service:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Print Image Digest
      run: |
        echo "Docker images built and pushed to ghcr.io/${{ github.repository }}"
        echo "Tags: ${{ github.sha }}, ${{ steps.meta.outputs.sha_short }}, latest"

