replicaCount: 2

image:
  repository: inventory-service
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 50013
  restPort: 5013

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

config:
  otelEndpoint: "otel-collector:4317"
  serviceName: "InventoryService"
  dbHost: "postgres-inventory"
  dbPort: "5432"
  dbName: "inventory_db"

database:
  existingSecret: "db-credentials"
  userKey: "POSTGRES_USER"
  passwordKey: "POSTGRES_PASSWORD"

healthCheck:
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "5013"

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: inventory-service
          topologyKey: kubernetes.io/hostname
