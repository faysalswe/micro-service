## Kong DB-less mode with Ingress Controller enabled.
## Routing is defined per-service via Kubernetes Ingress resources + KongPlugin CRDs.
## The custom rbac Lua plugin is still mounted from a ConfigMap.

image:
  repository: kong
  tag: "3.4"

env:
  database: "off"
  plugins: "bundled,rbac"

# Enable Ingress Controller — Ingress resources are the source of truth
ingressController:
  enabled: true
  installCRDs: false

proxy:
  enabled: true
  type: LoadBalancer
  http:
    enabled: true
    servicePort: 80
    containerPort: 8000
  tls:
    enabled: false

## Admin API — exposed for dev convenience (curl from laptop without port-forward).
## NEVER do this in prod: the admin API can rewrite every route in Kong.
admin:
  enabled: true
  type: LoadBalancer
  http:
    enabled: true
    servicePort: 8001
    containerPort: 8001

# Disable unused Enterprise components
enterprise:
  enabled: false
manager:
  enabled: false
portal:
  enabled: false
portalapi:
  enabled: false

deployment:
  userDefinedVolumes:
    - name: rbac-plugin
      configMap:
        name: kong-plugin-rbac
  userDefinedVolumeMounts:
    - name: rbac-plugin
      mountPath: /usr/local/share/lua/5.1/kong/plugins/rbac
      readOnly: true
