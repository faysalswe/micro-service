_format_version: "3.0"
_transform: true

# ============================================
# Consumers (API clients that need JWT)
# ============================================
consumers:
  - username: microservice-app
  - username: public-anon

# ============================================
# JWT Credentials for the consumer
# ============================================
jwt_secrets:
  - consumer: microservice-app
    key: IdentityService
    secret: ThisIsAVerySecretKeyForDevelopmentOnly123!
    algorithm: HS256

# ============================================
# Services
# ============================================
services:
  # Identity Service - login/register are public, /users requires Admin
  - name: identity-service
    url: http://host.docker.internal:5010
    routes:
      - name: identity-api
        paths:
          - /api/identity
        strip_path: false
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              secret_is_base64: false
              run_on_preflight: true
              anonymous: public-anon
          - name: rbac

  # Inventory Service - public/private split managed by rbac plugin PUBLIC_ROUTES table
  - name: inventory-service
    url: http://host.docker.internal:5013
    routes:
      - name: inventory-api
        paths:
          - /api/inventory
        strip_path: false
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              secret_is_base64: false
              run_on_preflight: true
              anonymous: public-anon
          - name: rbac

  # Order Service (REST API) - PROTECTED
  - name: order-service
    url: http://host.docker.internal:5011
    routes:
      - name: orders-api
        paths:
          - /api/orders
        strip_path: false
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              secret_is_base64: false
              run_on_preflight: true
          - name: rbac

  # Payment Service (REST API) - PROTECTED
  - name: payment-service
    url: http://host.docker.internal:5012
    routes:
      - name: payments-api
        paths:
          - /api/payments
        strip_path: false
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              secret_is_base64: false
              run_on_preflight: true
          - name: rbac

  # Inventory Service (gRPC)
  - name: inventory-grpc
    url: grpc://host.docker.internal:50013
    routes:
      - name: inventory-grpc-route
        paths:
          - /inventory.InventoryService
        protocols:
          - grpc
          - grpcs

  # Payment Service (gRPC)
  - name: payment-grpc
    url: grpc://host.docker.internal:50012
    routes:
      - name: payment-grpc-route
        paths:
          - /payments.PaymentService
        protocols:
          - grpc
          - grpcs

  # Cart Service (Python REST API) - PROTECTED
  - name: cart-service
    url: http://host.docker.internal:5014
    routes:
      - name: cart-api
        paths:
          - /api/cart
        strip_path: false
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              secret_is_base64: false
              run_on_preflight: true

  # PDF Service (Python REST API) - PROTECTED
  - name: pdf-service
    url: http://host.docker.internal:5015
    routes:
      - name: pdf-api
        paths:
          - /api/pdf
        strip_path: false
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              secret_is_base64: false
              run_on_preflight: true
          - name: rbac

  # MinIO Object Storage (Public Download)
  - name: storage-service
    url: http://host.docker.internal:9000
    routes:
      - name: storage-api
        paths:
          - /api/storage
        strip_path: true

  # Storefront (React SSR) - catch-all, must be last
  - name: storefront
    url: http://host.docker.internal:5009
    routes:
      - name: storefront-ui
        paths:
          - /
        strip_path: false

  # Back-office (Angular SPA via Nginx)
  - name: back-office
    url: http://host.docker.internal:5008
    routes:
      - name: back-office-ui
        paths:
          - /admin
        strip_path: true

plugins:
  # CORS - Allow browser requests
  - name: cors
    config:
      origins:
        - http://localhost:5008
        - http://localhost:5009
        - http://localhost:8000
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - X-Correlation-ID
      exposed_headers:
        - X-Correlation-ID
      credentials: true
      max_age: 3600
