apiVersion: v2
name: microservices-umbrella
description: Umbrella chart for deploying all microservices
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  # App services — each has a condition so they can be toggled on/off at deploy time
  - name: order-service
    version: "0.1.0"
    repository: "file://../apps/order-service"
    condition: order-service.enabled
  - name: payment-service
    version: "0.1.0"
    repository: "file://../apps/payment-service"
    condition: payment-service.enabled
  - name: identity-service
    version: "0.1.0"
    repository: "file://../apps/identity-service"
    condition: identity-service.enabled
  - name: inventory-service
    version: "0.1.0"
    repository: "file://../apps/inventory-service"
    condition: inventory-service.enabled
  - name: cart-service
    version: "0.1.0"
    repository: "file://../apps/cart-service"
    condition: cart-service.enabled
  - name: pdf-service
    version: "0.1.0"
    repository: "file://../apps/pdf-service"
    condition: pdf-service.enabled
  - name: storefront
    version: "0.1.0"
    repository: "file://../apps/storefront"
    condition: storefront.enabled
  - name: back-office
    version: "0.1.0"
    repository: "file://../apps/back-office"
    condition: back-office.enabled
  # Infrastructure and observability always deploy
  - name: infrastructure
    version: "0.1.0"
    repository: "file://../shared/infrastructure"
  - name: observability
    version: "0.1.0"
    repository: "file://../../observability/observability"

keywords:
  - microservices
  - saga
  - grpc
maintainers:
  - name: DevOps Team
