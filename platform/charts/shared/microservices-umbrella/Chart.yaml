apiVersion: v2
name: microservices-umbrella
description: Umbrella chart for deploying all microservices
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: order-service
    version: "0.1.0"
    repository: "file://../apps/order-service"
  - name: payment-service
    version: "0.1.0"
    repository: "file://../apps/payment-service"
  - name: identity-service
    version: "0.1.0"
    repository: "file://../apps/identity-service"
  - name: inventory-service
    version: "0.1.0"
    repository: "file://../apps/inventory-service"
  - name: storefront
    version: "0.1.0"
    repository: "file://../apps/storefront"
  - name: back-office
    version: "0.1.0"
    repository: "file://../apps/back-office"
  - name: infrastructure
    version: "0.1.0"
    repository: "file://../shared/infrastructure"
  - name: observability
    version: "0.1.0"
    repository: "file://../../observability/observability"

keywords:
  - microservices
  - saga
  - grpc
maintainers:
  - name: DevOps Team
