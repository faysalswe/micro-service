apiVersion: v1
kind: Service
metadata:
  name: {{ include "inventory-service.fullname" . }}
  labels:
    {{- include "inventory-service.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 5013
      targetPort: http
      protocol: TCP
      name: http
    - port: 50013
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "inventory-service.selectorLabels" . | nindent 4 }}