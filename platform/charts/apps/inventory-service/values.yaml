replicaCount: 1

image:
  registry: ""
  repository: inventory-service
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 5013
  grpcPort: 50013

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

config:
  otelEndpoint: "http://otel-collector:4317"
  serviceName: "InventoryService"

database:
  existingSecret: "db-credentials"

nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: inventory-service
          topologyKey: kubernetes.io/hostname
