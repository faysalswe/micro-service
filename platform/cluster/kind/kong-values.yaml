## kind override — use NodePort so Kong is reachable via extraPortMappings
## (kind's LoadBalancer IPs are on the Docker bridge, not accessible from host)
## kind-cluster.yaml maps:
##   containerPort 32000 → hostPort 8090   (proxy)
##   containerPort 32001 → hostPort 8100   (admin API)

proxy:
  type: NodePort
  http:
    nodePort: 32000
  tls:
    nodePort: 30443

admin:
  type: NodePort
  http:
    nodePort: 32001
