name: micro-service

networks:
  infra-network:
    external: true
    name: microservice-infra

services:
  identity-service:
    networks:
      - infra-network
    build:
      context: ../../
      dockerfile: services/IdentityService/Dockerfile.debug
    container_name: identity-service
    ports:
      - "${PORT_IDENTITY_SERVICE}:5010"
      - "${INTERNAL_PORT_GRPC_IDENTITY}:50010"
      - "2223:2222"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - LOKI_URL=${LOKI_URL}
      - Service__Name=IdentityService
      - Service__Version=${SERVICE_VERSION}
      - Jwt__Key=${JWT_SECRET}
      - Jwt__Issuer=IdentityService
      - Cors__AllowedOrigins=${CORS_ALLOWED_ORIGINS}

  order-service:
    networks:
      - infra-network
    build:
      context: ../../
      dockerfile: services/OrderService/Dockerfile.debug
    container_name: order-service
    ports:
      - "${PORT_ORDER_SERVICE}:5011"
      - "${INTERNAL_PORT_GRPC_ORDER}:50011"
      - "2224:2222"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__DefaultConnection=Host=order-db;Database=${DB_NAME_ORDER};Username=${DB_USER};Password=${DB_PASSWORD}
      - GrpcSettings__PaymentServiceUrl=${GRPC_URL_PAYMENT}
      - GrpcSettings__InventoryServiceUrl=${GRPC_URL_INVENTORY}
      - GrpcSettings__IdentityServiceUrl=${GRPC_URL_IDENTITY}
      - ExternalServices__PdfServiceUrl=${HTTP_URL_PDF}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - LOKI_URL=${LOKI_URL}
      - Service__Name=OrderService
      - Service__Version=${SERVICE_VERSION}

  payment-service:
    networks:
      - infra-network
    build:
      context: ../../
      dockerfile: services/PaymentService/Dockerfile.debug
    container_name: payment-service
    ports:
      - "${PORT_PAYMENT_SERVICE}:${INTERNAL_PORT_PAYMENT}"
      - "${INTERNAL_PORT_GRPC_PAYMENT}:${INTERNAL_PORT_GRPC_PAYMENT}"
      - "9229:9229"
    environment:
      - NODE_ENV=${NODE_ENV}
      - REST_PORT=${INTERNAL_PORT_PAYMENT}
      - GRPC_PORT=${INTERNAL_PORT_GRPC_PAYMENT}
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB_NAME=${DB_NAME_PAYMENT}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - LOKI_URL=${LOKI_URL}
      - SERVICE_NAME=PaymentService
      - SERVICE_VERSION=${SERVICE_VERSION}
      - CIRCUIT_BREAKER_TIMEOUT=${CIRCUIT_BREAKER_TIMEOUT}

  inventory-service:
    networks:
      - infra-network
    build:
      context: ../../
      dockerfile: services/InventoryService/Dockerfile.debug
    container_name: inventory-service
    ports:
      - "${PORT_INVENTORY_SERVICE}:${INTERNAL_PORT_INVENTORY}"
      - "${INTERNAL_PORT_GRPC_INVENTORY}:${INTERNAL_PORT_GRPC_INVENTORY}"
      - "4013:4013"
    environment:
      - SERVICE_NAME=InventoryService
      - SERVICE_VERSION=${SERVICE_VERSION}
      - DB_HOST=inventory-db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME_INVENTORY}
      - REST_PORT=${INTERNAL_PORT_INVENTORY}
      - GRPC_PORT=${INTERNAL_PORT_GRPC_INVENTORY}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - LOKI_URL=${LOKI_URL}

  # Python Cart Service
  cart-service:
    networks:
      - infra-network
    build:
      context: ../../services/CartService
      dockerfile: Dockerfile
    container_name: cart-service
    ports:
      - "${PORT_CART_SERVICE}:${INTERNAL_PORT_CART}"
    environment:
      - REDIS_URL=${REDIS_URL}
      - ORDER_SERVICE_URL=${ORDER_SERVICE_URL}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - SERVICE_NAME=CartService
      - SERVICE_VERSION=${SERVICE_VERSION}
      - REST_PORT=${INTERNAL_PORT_CART}

  # Python PDF Generation Service
  pdf-service:
    networks:
      - infra-network
    build:
      context: ../../services/PdfService
      dockerfile: Dockerfile
    container_name: pdf-service
    ports:
      - "${PORT_PDF_SERVICE}:${INTERNAL_PORT_PDF}"
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${MINIO_ROOT_USER}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - SERVICE_NAME=PdfService
      - SERVICE_VERSION=${SERVICE_VERSION}
      - REST_PORT=${INTERNAL_PORT_PDF}
