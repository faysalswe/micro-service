name: micro-service-infra

networks:
  infra-network:
    name: microservice-infra
    driver: bridge

services:
  # Database for .NET Order Service (Relational)
  order-db:
    image: postgres:16-alpine
    container_name: order-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: orders_db
    ports:
      - "${PORT_POSTGRES_ORDER:-5432}:5432"
    volumes:
      - order_data:/var/lib/postgresql/data
    networks:
      - infra-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d orders_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Database for Node.js Payment Service (Document-based)
  payment-db:
    image: mongo:7.0
    container_name: payment-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD:-password123}
    ports:
      - "${PORT_MONGODB_PAYMENT:-27017}:27017"
    volumes:
      - payment_data:/data/db
    networks:
      - infra-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Database for Go Inventory Service (Relational)
  inventory-db:
    image: postgres:16-alpine
    container_name: inventory-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: inventory_db
    ports:
      - "${PORT_POSTGRES_INVENTORY:-5433}:5432"
    volumes:
      - inventory_data:/var/lib/postgresql/data
    networks:
      - infra-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d inventory_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Caching and Message Broker
  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "${PORT_REDIS:-6379}:6379"
    networks:
      - infra-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway (Kong)
  kong:
    image: kong:3.4
    container_name: kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl, 0.0.0.0:9080 http2, 0.0.0.0:9091 ssl http2
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "127.0.0.1:8000:8000"     # Local HTTP Proxy
      - "8443:8443"               # HTTPS Proxy (Open)
      - "127.0.0.1:8001:8001"     # Local Admin API
      - "127.0.0.1:9080:9080"     # Local gRPC Proxy
    volumes:
      - ../config/gateway/kong.yml:/usr/local/kong/declarative/kong.yml:ro
    networks:
      - infra-network

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.112.0
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ../charts/observability/config/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"     # OTLP gRPC receiver
      - "4318:4318"     # OTLP HTTP receiver
      - "8888:8888"     # Telemetry metrics
      - "8889:8889"     # Prometheus exporter
    networks:
      - infra-network

  # Jaeger (Distributed Tracing UI)
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: jaeger
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # Jaeger UI
      - "14250:14250"   # gRPC collector
    networks:
      - infra-network

  # Loki (Log Aggregation)
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ../charts/observability/config/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"     # HTTP API (push/query logs)
    networks:
      - infra-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus (Metrics Storage)
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ../charts/observability/config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"     # Prometheus UI
    networks:
      - infra-network
    depends_on:
      - otel-collector

  # Grafana (Visualization)
  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3301:3000"     # Grafana UI
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ../charts/observability/config/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - infra-network
    depends_on:
      - prometheus
      - loki

  # Node Exporter (Host Metrics)
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - infra-network

  # cAdvisor (Container Metrics)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    networks:
      - infra-network

volumes:
  order_data:
  payment_data:
  inventory_data:
  loki_data:
  prometheus_data:
  grafana_data:
