name: micro-service

networks:
  infra-network:
    external: true
    name: microservice-infra

services:
  identity-service:
    networks:
      - infra-network
    build:
      context: ../../
      dockerfile: services/IdentityService/Dockerfile.debug
    container_name: identity-service
    ports:
      - "${PORT_IDENTITY_SERVICE:-5010}:5010"
      - "2223:2222"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
    depends_on:
      - redis

  order-service:
    networks:
      - infra-network
    build:
      context: ../../
      dockerfile: services/OrderService/Dockerfile.debug
    container_name: order-service
    ports:
      - "${PORT_ORDER_SERVICE:-5011}:5011"
      - "${INTERNAL_PORT_GRPC_ORDER:-50011}:50011"
      - "2224:2222"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ConnectionStrings__DefaultConnection=Host=order-db;Database=orders_db;Username=${DB_USER:-admin};Password=${DB_PASSWORD:-password123}
      - Redis__Configuration=redis:${PORT_REDIS:-6379}
      - GrpcSettings__PaymentServiceUrl=${URL_PAYMENT_SERVICE:-http://payment-service:50012}
      - GrpcSettings__InventoryServiceUrl=${URL_INVENTORY_SERVICE:-http://inventory-service:50013}
      - OpenTelemetry__Endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
    depends_on:
      order-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  payment-service:
    networks:
      - infra-network
    build:
      context: ../../
      dockerfile: services/PaymentService/Dockerfile.debug
    container_name: payment-service
    ports:
      - "${PORT_PAYMENT_SERVICE:-5012}:5012"
      - "${INTERNAL_PORT_GRPC_PAYMENT:-50012}:50012"
      - "9229:9229"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - MONGO_URI=mongodb://${DB_USER:-admin}:${DB_PASSWORD:-password123}@payment-db:27017
      - MONGO_DB_NAME=payments_db
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - LOKI_URL=${LOKI_URL:-http://loki:3100}
    depends_on:
      payment-db:
        condition: service_healthy

  inventory-service:
    networks:
      - infra-network
    build:
      context: ../../
      dockerfile: services/InventoryService/Dockerfile.debug
    container_name: inventory-service
    ports:
      - "${PORT_INVENTORY_SERVICE:-5013}:5013"
      - "${INTERNAL_PORT_GRPC_INVENTORY:-50013}:50013"
      - "4013:4013"
    environment:
      - DB_HOST=inventory-db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-password123}
      - DB_NAME=inventory_db
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
    depends_on:
      inventory-db:
        condition: service_healthy
