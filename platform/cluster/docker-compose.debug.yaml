name: micro-service

networks:
  infra-network:
    external: true
    name: microservice-infra

services:
  identity-service:
    networks:
      - infra-network
    build:
      context: ../../
      dockerfile: services/IdentityService/Dockerfile.debug
    container_name: identity-service
    ports:
      - "${PORT_IDENTITY_SERVICE:-5010}:5010"
      - "2223:2222"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - Service__Name=IdentityService
      - Service__Version=1.0.0
      - Jwt__Key=${DB_PASSWORD:-ThisIsAVerySecretKeyForDevelopmentOnly123!}
      - Jwt__Issuer=IdentityService

  order-service:
    networks:
      - infra-network
    build:
      context: ../../
      dockerfile: services/OrderService/Dockerfile.debug
    container_name: order-service
    ports:
      - "${PORT_ORDER_SERVICE:-5011}:5011"
      - "${INTERNAL_PORT_GRPC_ORDER:-50011}:50011"
      - "2224:2222"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ConnectionStrings__DefaultConnection=Host=order-db;Database=orders_db;Username=${DB_USER:-admin};Password=${DB_PASSWORD:-password123}
      - Redis__Configuration=redis:6379
      - GrpcSettings__PaymentServiceUrl=http://payment-service:50012
      - GrpcSettings__InventoryServiceUrl=http://inventory-service:50013
      - ExternalServices__PdfServiceUrl=http://pdf-service:5015
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - Service__Name=OrderService
      - Service__Version=1.0.0

  payment-service:
    networks:
      - infra-network
    build:
      context: ../../
      dockerfile: services/PaymentService/Dockerfile.debug
    container_name: payment-service
    ports:
      - "${PORT_PAYMENT_SERVICE:-5012}:${INTERNAL_PORT_PAYMENT:-5012}"
      - "${INTERNAL_PORT_GRPC_PAYMENT:-50012}:${INTERNAL_PORT_GRPC_PAYMENT:-50012}"
      - "9229:9229"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - REST_PORT=${INTERNAL_PORT_PAYMENT:-5012}
      - PORT=${INTERNAL_PORT_GRPC_PAYMENT:-50012}
      - MONGO_URI=mongodb://${DB_USER:-admin}:${DB_PASSWORD:-password123}@payment-db:27017
      - MONGO_DB_NAME=payments_db
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - SERVICE_NAME=PaymentService

  inventory-service:
    networks:
      - infra-network
    build:
      context: ../../
      dockerfile: services/InventoryService/Dockerfile.debug
    container_name: inventory-service
    ports:
      - "${PORT_INVENTORY_SERVICE:-5013}:${INTERNAL_PORT_INVENTORY:-5013}"
      - "${INTERNAL_PORT_GRPC_INVENTORY:-50013}:${INTERNAL_PORT_GRPC_INVENTORY:-50013}"
      - "4013:4013"
    environment:
      - SERVICE_NAME=InventoryService
      - DB_HOST=inventory-db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-password123}
      - DB_NAME=inventory_db
      - REST_PORT=${INTERNAL_PORT_INVENTORY:-5013}
      - GRPC_PORT=${INTERNAL_PORT_GRPC_INVENTORY:-50013}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}

  # Python Cart Service
  cart-service:
    networks:
      - infra-network
    build:
      context: ../../services/CartService
      dockerfile: Dockerfile
    container_name: cart-service
    ports:
      - "5014:5014"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ORDER_SERVICE_URL=order-service:50011
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - SERVICE_NAME=CartService
      - REST_PORT=5014

  # Python PDF Generation Service
  pdf-service:
    networks:
      - infra-network
    build:
      context: ../../services/PdfService
      dockerfile: Dockerfile
    container_name: pdf-service
    ports:
      - "5015:5015"
    environment:
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=admin
      - S3_SECRET_KEY=password123
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - SERVICE_NAME=PdfService
