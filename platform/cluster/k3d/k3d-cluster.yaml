apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: micro-cluster
servers: 3
agents: 3
ports:
  - port: 8090:80
    nodeFilters:
      - loadbalancer
  - port: 8543:443
    nodeFilters:
      - loadbalancer
  - port: 8100:8001
    nodeFilters:
      - loadbalancer
registries:
  create:
    name: micro-registry
    host: 0.0.0.0
    hostPort: "5001"
  config: |
    mirrors:
      "localhost:5001":
        endpoint:
          - "http://micro-registry:5000"
options:
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:*
      - arg: --tls-san=127.0.0.1
        nodeFilters:
          - server:*
  kubeconfig:
    updateDefaultKubeconfig: true