version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: inventory-service/proto

plugins:
  # 1. Go Generation for InventoryService
  - local: protoc-gen-go
    out: services/InventoryService/proto
    opt: paths=source_relative

  - local: protoc-gen-go-grpc
    out: services/InventoryService/proto
    opt: paths=source_relative

  # 2. Modern TypeScript/ES Generation for PaymentService
  - local: protoc-gen-es
    out: services/PaymentService/src/generated
    opt: target=ts

  - local: protoc-gen-connect-es
    out: services/PaymentService/src/generated
    opt: target=ts
