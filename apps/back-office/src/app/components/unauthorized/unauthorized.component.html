<div class="flex items-center justify-center min-h-screen bg-gray-50">
  <div class="card-base text-center" style="max-width: 480px; width: 100%; padding: 3rem;">

    <div class="flex items-center justify-center mb-6">
      <div class="stat-icon" style="background: #fef2f2; color: #dc2626; width: 72px; height: 72px; border-radius: 50%; font-size: 2rem;">
        <i class="pi pi-lock"></i>
      </div>
    </div>

    <h1 class="page-title mb-2">Access Denied</h1>
    <p class="text-gray-500 mb-6">
      Your account role
      <span class="font-semibold text-gray-700">({{ authService.currentUserRole() }})</span>
      does not have permission to view this page.
    </p>

    <div class="mb-8 p-4 rounded-lg" style="background: #fef2f2; border: 1px solid #fecaca;">
      <div class="flex items-center gap-2 justify-center text-red-700 text-sm font-medium">
        <i class="pi pi-info-circle"></i>
        Contact your administrator to request access.
      </div>
    </div>

    <p-button
      label="Go to Dashboard"
      icon="pi pi-home"
      (onClick)="goToDashboard()"
      styleClass="w-full"
    />
  </div>
</div>
