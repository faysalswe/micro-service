<p-toast></p-toast>

<div [style.max-width]="isDialog ? '100%' : '800px'" [style.margin]="isDialog ? '0' : '0 auto'" class="animate-in">
    <!-- Header: Only show if NOT in a dialog (Dialog has its own header) -->
    <div *ngIf="!isDialog" class="flex items-center gap-4" style="margin-bottom: var(--space-8);">
        <p-button icon="pi pi-arrow-left" [text]="true" (click)="onCancel()" severity="secondary" 
                styleClass="card-base" [style]="{'padding': '0.75rem', 'background': 'white'}"></p-button>
        <div>
            <h2 class="page-title">
                {{ isEditMode ? 'Modify SKU' : 'New Product Registration' }}
            </h2>
            <p class="text-gray-500 font-medium">Define product specifications and global stock allocation.</p>
        </div>
    </div>

    <div [class.card-base]="!isDialog" [style.border-radius]="isDialog ? '0' : '16px'" [style.padding]="isDialog ? 'var(--space-2)' : 'var(--space-10)'">
    <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-10">
        
        <!-- General Section -->
        <div class="flex flex-col gap-6">
        <div class="flex items-center gap-2">
            <span style="width: 4px; height: 16px; background: var(--brand-500); border-radius: 4px;"></span>
            <h3 class="section-title" style="margin: 0;">Identity & Categorization</h3>
        </div>
        
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: var(--space-8);">
            <div class="flex flex-col gap-2">
                <p-floatlabel variant="on">
                    <input pInputText id="productId" formControlName="productId" [readOnly]="isEditMode" class="w-full" style="padding: 1rem;" />
                    <label for="productId">SKU / Unique Identifier</label>
                </p-floatlabel>
                <small style="color: var(--error); font-weight: 700; padding-left: var(--space-2);" *ngIf="productForm.get('productId')?.invalid && productForm.get('productId')?.touched">SKU identifier is mandatory.</small>
            </div>

            <div class="flex flex-col gap-2">
                <p-floatlabel variant="on">
                    <input pInputText id="name" formControlName="name" class="w-full" style="padding: 1rem;" />
                    <label for="name">Official Product Name</label>
                </p-floatlabel>
                <small style="color: var(--error); font-weight: 700; padding-left: var(--space-2);" *ngIf="productForm.get('name')?.invalid && productForm.get('name')?.touched">Product name is required.</small>
            </div>
        </div>
        </div>

        <!-- Pricing Section -->
        <div class="flex flex-col gap-6">
        <div class="flex items-center gap-2">
            <span style="width: 4px; height: 16px; background: var(--success); border-radius: 4px;"></span>
            <h3 class="section-title" style="margin: 0; color: var(--success);">Financials & Availability</h3>
        </div>
        
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: var(--space-8);">
            <div class="flex flex-col gap-2">
                <p-floatlabel variant="on">
                    <p-inputNumber 
                        id="price" 
                        formControlName="price" 
                        mode="currency" 
                        currency="USD" 
                        locale="en-US" 
                        styleClass="w-full"
                        inputStyleClass="w-full"
                        [inputStyle]="{'padding': '1rem'}"
                        [min]="0"
                    ></p-inputNumber>
                    <label for="price">MSRP / Unit Price</label>
                </p-floatlabel>
            </div>

            <div class="flex flex-col gap-2">
                <p-floatlabel variant="on">
                    <p-inputNumber 
                        id="quantity" 
                        formControlName="quantity" 
                        [showButtons]="true" 
                        [min]="0"
                        styleClass="w-full"
                        inputStyleClass="w-full"
                        [inputStyle]="{'padding': '1rem'}"
                    ></p-inputNumber>
                    <label for="quantity">Initial Stock Quantity</label>
                </p-floatlabel>
            </div>
        </div>
        </div>

        <div class="flex justify-between items-center" style="padding-top: var(--space-8); border-top: 1px solid var(--slate-100);">
        <p-button label="Discard" severity="secondary" [text]="true" (click)="onCancel()" styleClass="font-bold"></p-button>
        <p-button 
            [label]="loading() ? 'Processing...' : (isEditMode ? 'Commit Updates' : 'Authorize Creation')" 
            [icon]="loading() ? 'pi pi-spin pi-spinner' : 'pi pi-check-circle'"
            type="submit" 
            [disabled]="productForm.invalid || loading()"
            severity="primary"
            [style]="{'padding': '1rem 2.5rem', 'font-weight': '800'}"
        ></p-button>
        </div>
    </form>
    </div>
</div>
